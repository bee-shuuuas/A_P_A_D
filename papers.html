<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Search and filter the A_P_A_D reading library.">
    <title>Papers | A_P_A_D</title>
    <link rel="icon" href="assets/images/apad-mark.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/main.css">
    <script src="assets/js/app.js" defer></script>
  </head>
  <body data-page="papers">
    <header class="site-header">
      <div class="wrapper header-content">
        <a class="site-title" href="index.html" aria-label="A_P_A_D home">
          <img src="assets/images/apad-mark.svg" alt="" class="site-logo">
          <span>A_P_A_D</span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a class="page-link" href="index.html">Dashboard</a>
          <a class="page-link active" href="papers.html">Papers</a>
          <a class="page-link" href="tags.html">Tags</a>
          <a class="page-link" href="add.html">Add</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="wrapper">
        <section class="page-heading">
          <p class="eyebrow">Library</p>
          <h1>Paper collection</h1>
        </section>

        <section class="toolbar" aria-label="Paper filters">
          <label>
            <span>Search</span>
            <input id="paperSearch" type="search" placeholder="Title, author, venue, tag">
          </label>
          <label>
            <span>Tag</span>
            <select id="tagFilter">
              <option value="all">All tags</option>
            </select>
          </label>
          <label>
            <span>Status</span>
            <select id="statusFilter">
              <option value="all">All status</option>
              <option value="queued">Queued</option>
              <option value="reading">Reading</option>
              <option value="saved">Saved</option>
              <option value="read">Read</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <div class="section-header">
            <div>
              <p class="eyebrow">Browse</p>
              <h2 id="paperCount">All papers</h2>
            </div>
            <a class="button secondary" href="add.html">Add paper</a>
          </div>
          <div id="papersList" class="paper-list grid-list"></div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrapper footer-content">
        <span>A_P_A_D</span>
        <span>Daily reading, one paper at a time.</span>
      </div>
    </footer>
  </body>
</html>
